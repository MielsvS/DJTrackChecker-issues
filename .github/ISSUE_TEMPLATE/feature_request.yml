name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make DJTrackChecker better? We'd love to hear it!

  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: Describe the feature or improvement.
      placeholder: Describe your idea...
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: How would you use this?
      description: Help us understand your workflow and why this would be useful.
      placeholder: In my DJ workflow, I often need to...
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would use it regularly
        - Critical for my workflow

  - type: input
    id: version
    attributes:
      label: App version (optional)
      description: The version you're currently using (Help → About)
      placeholder: e.g. 0.3.1

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, examples, or references to similar features in other tools.
