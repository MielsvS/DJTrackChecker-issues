name: Bug Report
description: Report a problem with DJTrackChecker
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below so we can investigate.

        **Tip:** You can find your version number and machine hash in the app under **Help → About**.

  - type: input
    id: version
    attributes:
      label: App version
      description: The version number shown in Help → About
      placeholder: e.g. 0.3.1
    validations:
      required: true

  - type: input
    id: machine_hash
    attributes:
      label: Machine hash
      description: The machine hash shown in Help → About
      placeholder: e.g. a1b2c3d4

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Other
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what went wrong...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: Describe what you expected...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we trigger the same problem?
      placeholder: |
        1. Open the app
        2. Select a folder with ...
        3. Click Process
        4. ...
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, error messages, or anything else that might help.

  - type: markdown
    attributes:
      value: |
        **Log files:** If the issue involves unexpected processing results or errors, please email your log file to **support@djtrackchecker.com** and mention this issue number in the subject line. Log files may contain file paths and are kept confidential.
